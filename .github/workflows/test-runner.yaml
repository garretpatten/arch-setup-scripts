name: 'Test Runner'

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: 'Test Arch Setup Scripts'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Make scripts executable
        run: chmod +x src/scripts/*.sh .github/scripts/*.sh

      - name: Pull Arch image and run setup
        run: |
          docker pull archlinux:base-devel
          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/workspace:rw" \
            -w /workspace \
            archlinux:base-devel \
            bash /workspace/.github/scripts/arch-ci-inner.sh

      - name: Check error log
        working-directory: ${{ github.workspace }}
        run: bash .github/scripts/check-setup-errors.sh
