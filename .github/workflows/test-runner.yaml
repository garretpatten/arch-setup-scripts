name: 'Test Runner'

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: 'Test Arch Setup Scripts'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: archlinux:base-devel
      options: --user root

    steps:
      - name: Bootstrap container dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --needed --noconfirm git sudo base-devel

      - name: Create non-root build user
        run: |
          useradd -m -G wheel runner
          echo "runner ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          chown -R runner:runner "$GITHUB_WORKSPACE" || true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Make scripts executable
        run: chmod +x src/scripts/*.sh

      # archlinux:base-devel is a minimal image: no GNOME schemas, so system-config.sh skips gsettings (expected).
      - name: Run setup scripts
        run: |
          chown -R runner:runner "$GITHUB_WORKSPACE"
          su - runner -c "cd '$GITHUB_WORKSPACE'/src/scripts && bash master.sh || true"

      - name: Check error log
        working-directory: ${{ github.workspace }}
        run: |
          ERROR_LOG="setup_errors.log"
          if [[ -f "$ERROR_LOG" ]] && [[ -s "$ERROR_LOG" ]]; then
            FILTERED_LOG=$(mktemp)
            grep -v -E "(warning: .* is up to date|skipping|Synchronizing package databases|there is nothing to do|::|chsh: PAM: Authentication failure|Password:|systemctl restart|^Cloning into|^Updating files:|^Resolving |^Connecting to |^HTTP request sent|^Length:|^Saving to:|^--[0-9]{4}-[0-9]{2}-[0-9]{2}|^[0-9]{4}-[0-9]{2}-[0-9]{2}.*saved|^[[:space:]]*[0-9]+K|done\.$|^[[:space:]]*100%|^npm notice|% Total|% Received|% Xferd|Average Speed|Dload  Upload|Time    Time     Time  Current|--:--:--)" "$ERROR_LOG" | grep -v '^[[:space:]]*$' > "$FILTERED_LOG" || true

            if [[ -s "$FILTERED_LOG" ]]; then
              echo "❌ Errors found:"
              cat "$FILTERED_LOG"
              rm -f "$FILTERED_LOG"
              exit 1
            fi
            rm -f "$FILTERED_LOG"
          fi
